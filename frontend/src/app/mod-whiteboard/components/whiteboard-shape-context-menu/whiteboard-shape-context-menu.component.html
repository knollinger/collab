<span class="menu-trigger"
      [matMenuTriggerFor]="contextMenu"
      [style.left]="triggerPosX"
      [style.top]="triggerPosY">
</span>

<mat-menu #contextMenu="matMenu">

    <button mat-menu-item
            [matMenuTriggerFor]="zOrderMenu">
        <mat-icon class="material-symbols-outlined">file_open</mat-icon>Anordnen
    </button>

    <mat-divider></mat-divider>
    <mat-divider></mat-divider>
    <button mat-menu-item
            (click)="onDelete()">
        <mat-icon class="material-symbols-outlined">delete</mat-icon>Löschen
    </button>

</mat-menu>

<!-- Order-Submenu -->
<mat-menu #zOrderMenu="matMenu">

    <button mat-menu-item
            (click)="onMoveToBackground()">
        <mat-icon class="material-symbols-outlined">keyboard_double_arrow_up</mat-icon>Ganz nach hinten
    </button>

    <button mat-menu-item
            (click)="onMoveBack()">
        <mat-icon class="material-symbols-outlined">keyboard_arrow_up</mat-icon>Weiter nach hinten
    </button>

    <button mat-menu-item
            (click)="onMoveFore()">
        <mat-icon class="material-symbols-outlined">keyboard_arrow_down</mat-icon>Weiter nach vorn
    </button>

    <button mat-menu-item
            (click)="onMoveToForeground()">
        <mat-icon class="material-symbols-outlined">keyboard_double_arrow_down</mat-icon>Ganz nach vorn
    </button>
</mat-menu>
