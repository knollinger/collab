<span class="menu-trigger"
      [matMenuTriggerFor]="contextMenu"
      [style.left]="triggerPosX"
      [style.top]="triggerPosY">
</span>

<mat-menu #contextMenu="matMenu">

    <button mat-menu-item
            [matMenuTriggerFor]="backgroundColorMenu">
        <mat-icon class="material-symbols-outlined">format_color_fill</mat-icon>Hintergrund-Farbe
    </button>

    <mat-divider></mat-divider>
    <button mat-menu-item
            [matMenuTriggerFor]="frameMenu">
        <mat-icon class="material-symbols-outlined">border_style</mat-icon>Rahmen
    </button>

    <mat-divider></mat-divider>
    <button mat-menu-item
            [matMenuTriggerFor]="zOrderMenu">
        <mat-icon class="material-symbols-outlined">file_open</mat-icon>Anordnen
    </button>

    <mat-divider></mat-divider>
    <button mat-menu-item>
        <mat-icon class="material-symbols-outlined">delete</mat-icon>Löschen
    </button>

</mat-menu>

<!-- Order-Submenu -->
<mat-menu #zOrderMenu="matMenu">

    <button mat-menu-item
            (click)="onMoveToBackground()">
        <mat-icon class="material-symbols-outlined">keyboard_double_arrow_up</mat-icon>Ganz nach hinten
    </button>

    <button mat-menu-item
            (click)="onMoveBack()">
        <mat-icon class="material-symbols-outlined">keyboard_arrow_up</mat-icon>Weiter nach hinten
    </button>

    <button mat-menu-item
            (click)="onMoveFore()">
        <mat-icon class="material-symbols-outlined">keyboard_arrow_down</mat-icon>Weiter nach vorn
    </button>

    <button mat-menu-item
            (click)="onMoveToForeground()">
        <mat-icon class="material-symbols-outlined">keyboard_double_arrow_down</mat-icon>Ganz nach vorn
    </button>
</mat-menu>

<!-- Background-Submenu -->
<mat-menu #backgroundColorMenu="matMenu">

    <button mat-menu-item
            *ngFor="let color of colors"
            (click)="onSetBackgroundColor(color)">
        <div class="color-preview"
             style.background-color="{{color}}"></div>
    </button>

</mat-menu>

<!-- Rahmen-SubMenu -->
<mat-menu #frameMenu="matMenu">

    <button mat-menu-item
            [matMenuTriggerFor]="frameColorMenu">
        <mat-icon class="material-symbols-outlined">format_color_fill</mat-icon>Rahmen-Farbe
    </button>

    <button mat-menu-item
            [matMenuTriggerFor]="frameStyleMenu">
        <mat-icon class="material-symbols-outlined">border_style</mat-icon>Rahmen-Style
    </button>

    <button mat-menu-item
            [matMenuTriggerFor]="frameSizeMenu">
        <mat-icon class="material-symbols-outlined">border_color</mat-icon>Rahmen-Stärke
    </button>

</mat-menu>

<!-- FrameColor-Submenu -->
<mat-menu #frameColorMenu="matMenu">

    <button mat-menu-item
            *ngFor="let color of colors"
            (click)="onSetBorderColor(color)">
        <div class="color-preview"
             style.background-color="{{color}}"></div>
    </button>

</mat-menu>

<!-- FrameStyle-Submenu -->
<mat-menu #frameStyleMenu="matMenu">

    <button mat-menu-item
            *ngFor="let border of borders"
            (click)="onSetBorderStyle(border)">
        <div class="border-style-preview"
             style.border-style="{{border}}"></div>
    </button>

</mat-menu>

<!-- FrameSize-Submenu -->
<mat-menu #frameSizeMenu="matMenu">

    <button mat-menu-item
            *ngFor="let size of borderSizes"
            (click)="onSetBorderWidth(size)">
        <div class="border-style-preview"
             style.border-width="{{size}}px"></div>
    </button>

</mat-menu>
