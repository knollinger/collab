<div class="outer-cnr mat-app-background">
    <app-toolbar class="toolbar">

        <!-- All about shapes -->

        <button mat-icon-button
                cdkOverlayOrigin
                #shapesMenuTrigger="cdkOverlayOrigin"
                (click)="showShapesMenu=true">
            <mat-icon class="material-symbols-outlined">shapes</mat-icon>
        </button>

        <ng-template cdkConnectedOverlay
                     [cdkConnectedOverlayOrigin]="shapesMenuTrigger"
                     [cdkConnectedOverlayOpen]="showShapesMenu"
                     [cdkConnectedOverlayHasBackdrop]="true"
                     cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
                     cdkConnectedOverlayPanelClass="menu-overlay-pane"
                     (backdropClick)="showShapesMenu=false">

            <div class="multi-column-menu mat-elevation-z4"
                 (click)="showShapesMenu=false">

                <div class="multi-column-menu-title">Formen</div>
                <button mat-icon-button
                        (click)="onCreateShape('rect')"
                        matTooltip="Rechteck">
                    <mat-icon class="material-symbols-outlined">rectangle</mat-icon>
                </button>

                <button mat-icon-button
                        (click)="onCreateShape('rombus')"
                        matTooltip="Rombus">
                    <mat-icon class="material-symbols-outlined">stat_0</mat-icon>
                </button>

                <button mat-icon-button
                        (click)="onCreateShape('ellipse')"
                        matTooltip="Kreis/Elipse">
                    <mat-icon class="material-symbols-outlined">circle</mat-icon>
                </button>

                <button mat-icon-button
                        (click)="onCreateShape('parallelogram')"
                        matTooltip="Parallelogram">
                    <mat-icon class="material-symbols-outlined">rectangle</mat-icon>
                    <!-- TODO: Icon stimmt nicht, ggf SVG embedden -->
                </button>

                <div class="multi-column-menu-title">Text-Bereiche</div>
                <button mat-icon-button
                        matTooltip="Text-Feld">
                    <mat-icon class="material-symbols-outlined">text_ad</mat-icon>
                </button>

                <button mat-icon-button
                        matTooltip="Kommentar">
                    <mat-icon class="material-symbols-outlined">comment</mat-icon>
                </button>

            </div>
        </ng-template>

        <!-- Connectors -->
        <button mat-icon-button
                matTooltip="Verbindungen"
                cdkOverlayOrigin
                #connectorsMenuTrigger="cdkOverlayOrigin"
                (click)="showConnectorsMenu=true">
            <mat-icon class="material-symbols-outlined">line_end</mat-icon>
        </button>

        <ng-template cdkConnectedOverlay
                     [cdkConnectedOverlayOrigin]="connectorsMenuTrigger"
                     [cdkConnectedOverlayOpen]="showConnectorsMenu"
                     [cdkConnectedOverlayHasBackdrop]="true"
                     cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
                     cdkConnectedOverlayPanelClass="menu-overlay-pane"
                     (backdropClick)="showConnectorsMenu=false">

            <div class="multi-column-menu mat-elevation-z4"
                 (click)="showConnectorsMenu=false">

                <div>

                    <button mat-icon-button>
                        <mat-icon class="material-symbols-outlined">remove</mat-icon>
                    </button>

                    <button mat-icon-button>
                        <mat-icon class="material-symbols-outlined">line_end</mat-icon>
                    </button>

                    <button mat-icon-button>
                        <mat-icon class="material-symbols-outlined">line_end_arrow</mat-icon>
                    </button>
                </div>
                <div>
                    <button mat-icon-button>
                        <mat-icon class="material-symbols-outlined">line_end_circle</mat-icon>
                    </button>

                    <button mat-icon-button>
                        <mat-icon class="material-symbols-outlined">line_end_diamond</mat-icon>
                    </button>

                    <button mat-icon-button>
                        <mat-icon class="material-symbols-outlined">line_end_square</mat-icon>
                    </button>
                </div>

            </div>
        </ng-template>

        <!-- export -->
        <app-toolbar-separator></app-toolbar-separator>
        <button mat-icon-button
                matTooltip="Als Grafik herunter laden"
                (click)="onExport()">
            <mat-icon class="material-symbols-outlined">download</mat-icon>
        </button>

        <!-- löschen -->
        <app-toolbar-separator></app-toolbar-separator>
        <button mat-icon-button
                [disabled]="!hasSelection"
                (click)="onDeleteSelectedShapes()">
            <mat-icon class="material-symbols-outlined">delete</mat-icon>
        </button>

        <app-toolbar-filler></app-toolbar-filler>
        <mat-button-toggle [checked]="showGridLines"
                           (change)="showGridLines = $event.source.checked">
            <mat-icon class="material-symbols-outlined">border_clear</mat-icon>
        </mat-button-toggle>
    </app-toolbar>

    <div class="workspace">

        <div class="svg-scroller">

            <svg #svg
                 xmlns="http://www.w3.org/2000/svg"
                 [style.width]="imgWidth"
                 [style.height]="imgHeight"
                 (mousedown)="onMouseDown($event)"
                 (mousemove)="onMouseMove($event)"
                 (mouseup)="onMouseUp($event)"
                 (mouseleave)="onMouseLeave($event)">

                <style>
                    rect,
                    ellipse,
                    polygon {
                        cursor: move;
                        outline: none;
                    }

                    .decorator-frame {
                        stroke: lightgray;
                        stroke-width: 2;
                        stroke-dasharray: 2 2;
                        fill: transparent;
                    }

                    .resize,
                    .connector {
                        stroke-width: 2;
                        stroke: cornflowerblue;
                        fill: lightblue;
                    }

                    .connector {
                        cursor: crosshair;
                    }

                    .north {
                        x: calc(50% - 4)
                    }

                    .drag-ne {
                        cursor: ne-resize;
                    }

                    .drag-n {
                        cursor: n-resize;
                    }

                    .drag-nw {
                        cursor: nw-resize;
                    }

                    .drag-w {
                        cursor: w-resize;
                    }

                    .drag-e {
                        cursor: e-resize;
                    }

                    .drag-se {
                        cursor: se-resize;
                    }

                    .drag-s {
                        cursor: s-resize;
                    }

                    .drag-sw {
                        cursor: sw-resize;
                    }

                    .selector-frame {
                        fill: rgba(0, 0, 255, 0.3);
                        stroke: lightblue';

                    }

                    svg {
                        filter: drop-shadow(3px 5px 2px rgb(0 0 0 / 0.4));
                    }
                </style>
            </svg>
            
            <app-whiteboard-shape-context-menu (delete)="onDeleteSelectedShapes()"
                                               (zOrderChanged)="onChangeZOrder($event)">
            </app-whiteboard-shape-context-menu>
        </div>


        <div class="sidebar"
             *ngIf="hasSelection">
            <app-whiteboard-siderbar [shapes]="selectedShapes"></app-whiteboard-siderbar>
        </div>

    </div>
</div>
