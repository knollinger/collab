<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- A marker to be used as an square -->
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="10"
      refY="5"
      markerWidth="5"
      markerHeight="5"
      orient="auto-start-reverse">
      <rect width="10" height="10" fill="#ffff" stroke="#000000" stroke-width="2" />
    </marker>

    <!-- a circle-marker -->
    <marker
      id="circle"
      viewBox="0 0 10 10"
      refX="5"
      refY="5"
      markerWidth="5"
      markerHeight="5"
      orient="auto-start-reverse">
      <ellipse cx="5" cy="5" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="1" />
    </marker>


  </defs>

   <ellipse cx="5" cy="5" rx="3" ry="3" fill="#ffffff" stroke="#000000"  />
  <!-- A line with a marker -->
  <line
    x1="10"
    y1="10"
    x2="90"
    y2="90"
    stroke="black"
    marker-start="url(#arrow)" />

  <!-- A curved path with markers -->
  <path
    d="M 110 10
       C 120 20, 130 20, 140 10
       C 150 0, 160 0, 170 10
       C 180 20, 190 20, 200 10"
    stroke="black"
    fill="none"
    marker-start="url(#circle)"
    marker-mid="url(#arrow)"
    marker-end="url(#arrow)" />
</svg>
