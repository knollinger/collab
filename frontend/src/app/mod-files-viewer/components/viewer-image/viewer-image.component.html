<div class="outer-cnr">

    <div class="current-view">
        <img class="current-image" [src]="sourceUrl(currId) | safe:'resourceUrl'">
    </div>

    <div class="gallery">
        <img *ngFor="let uuid of allSiblings"
             class="preview-img"
             [class.selected]="isSelected(uuid)"
             (click)="currId = uuid"
             [id]="uuid"
             [src]="sourceUrl(uuid) | safe:'resourceUrl'">
    </div>
</div>
