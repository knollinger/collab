<div class="full-height">

     <div class="workspace"
          *ngIf="viewMode !== 'table'"
          [class.grid-workspace]="viewMode === 'grid'"
          [class.list-workspace]="viewMode === 'list'"
          (click)="selection.clear()"
          [appDropTarget]="parent"
          (filesDropped)="onFilesDropped($event)"
          (inodesDropped)="inodeDropMenu.show($event)"
          (contextmenu)="folderCtxtMenu.show($event)">

          <!-- 
          GridView und ListView sind identisch, da werden die Unterschiede nur 
          per CSS definiert
          -->
          <div *ngFor="let inode of visibleChilds"
               [class.grid-item]="viewMode === 'grid'"
               [class.list-item]="viewMode === 'list'"
               [class.locked]="isLocked(inode)"
               [class.mat-elevation-z4]="isSelected(inode)"
               [appINodeDragSource]="inode"
               [appINodeDragSourceSelectedINodes]="selection"
               [appDropTarget]="inode"
               (filesDropped)="onFilesDropped($event)"
               (inodesDropped)="inodeDropMenu.show($event)"
               (click)="onOpen(inode)"
               (contextmenu)="itemCtxtMenu.show(inode, $event)"
               [matTooltip]="inode.name">

               <div class="image"
                    [style.backgroundImage]="getINodeImageAsUrl(inode)"
                    [style.height]="iconSize"
                    [style.width]="iconSize">

                    <img class="link-indicator"
                         *ngIf="inode.isLink()"
                         [src]="linkIcon">
               </div>

               <div class="label"
                    [style.width]="iconSize">{{inode.name}}</div>

               <div class="selector"
                    (click)="onSelect($event, inode)">
                    <mat-icon class="material-symbols-outlined">add</mat-icon>
               </div>
          </div>
     </div>


     <!--
        Der TableView ist ein wenig spezieller.
     -->
     <div class="workspace"
          *ngIf="viewMode=='table'">

          <table mat-table
                 [dataSource]="visibleChilds"
                 [appDropTarget]="parent"
                 (filesDropped)="onFilesDropped($event)"
                 (inodesDropped)="inodeDropMenu.show($event)"
                 (contextmenu)="folderCtxtMenu.show($event)">

               <ng-container matColumnDef="selector">
                    <th mat-header-cell
                        *matHeaderCellDef></th>
                    <td mat-cell
                        *matCellDef="let inode">
                         <mat-checkbox color="primary"
                                       [checked]="isSelected(inode)"
                                       (click)="onSelect($event, inode)"></mat-checkbox>
                    </td>
               </ng-container>

               <ng-container matColumnDef="image">
                    <th mat-header-cell
                        *matHeaderCellDef></th>
                    <td mat-cell
                        *matCellDef="let inode">
                         <img [src]="getINodeImage(inode) | safe:'resourceUrl'"
                              [appINodeDragSource]="inode"
                              [appINodeDragSourceSelectedINodes]="selection"
                              [style.width]="iconSize">
                    </td>
               </ng-container>

               <ng-container matColumnDef="name">
                    <th mat-header-cell
                        *matHeaderCellDef>Name</th>
                    <td mat-cell
                        class="tableview-name"
                        *matCellDef="let inode"> {{inode.name}} </td>
               </ng-container>

               <ng-container matColumnDef="size">
                    <th mat-header-cell
                        *matHeaderCellDef>Größe</th>
                    <td mat-cell
                        *matCellDef="let inode"> {{inode.size | fileSize}} </td>
               </ng-container>

               <ng-container matColumnDef="created">
                    <th mat-header-cell
                        *matHeaderCellDef>Erzeugt</th>
                    <td mat-cell
                        *matCellDef="let inode"> {{inode.created | date:"dd.MM.yyyy hh:mm:ss"}} </td>
               </ng-container>

               <ng-container matColumnDef="modified">
                    <th mat-header-cell
                        *matHeaderCellDef>Verändert</th>
                    <td mat-cell
                        *matCellDef="let inode"> {{inode.modified | date:"dd.MM.yyyy hh:mm:ss"}} </td>
               </ng-container>

               <!-- <tr mat-header-row
                   *matHeaderRowDef="displayedColumns; sticky:true;"></tr> -->
               <tr mat-header-row
                   *matHeaderRowDef="displayedColumns"></tr>
               <tr mat-row
                   *matRowDef="let row; columns: displayedColumns;; let inode"
                   [class.locked]="isLocked(inode)"
                   [appDropTarget]="inode"
                   (filesDropped)="onFilesDropped($event)"
                   (inodesDropped)="inodeDropMenu.show($event)"
                   (click)="onOpen(inode)"
                   (contextmenu)="itemCtxtMenu.show(inode, $event)">
               </tr>
          </table>
     </div>

     <!-- Das Kontext-Menu für INodes -->
     <app-files-item-context-menu #itemCtxtMenu
                                  (open)="onOpen($event)"
                                  (create)="onCreateDocument($event)"
                                  (rename)="onRename($event)"
                                  (delete)="onDelete($event)"
                                  (cut)="onCut($event)"
                                  (copy)="onCopy($event)"
                                  (link)="onLink($event)"
                                  (paste)="onPaste()"
                                  (sendToDashboard)="onSendToDashboard($event)"
                                  (showProps)="onShowProps($event)">
     </app-files-item-context-menu>

     <!-- Das KontextMenu für den aktuellen Folder -->
     <app-files-folder-context-menu #folderCtxtMenu
                                    [inode]="parent"
                                    (createDocument)="onCreateDocument($event)"
                                    (paste)="onPaste()"
                                    (showProps)="onShowProps($event)">
     </app-files-folder-context-menu>

     <app-files-inode-drop-menu #inodeDropMenu
                                (copy)="onCopyDroppedINodes($event)"
                                (move)="onMoveDroppedINodes($event)"
                                (link)="onLinkDroppedINodes($event)"></app-files-inode-drop-menu>
</div>
